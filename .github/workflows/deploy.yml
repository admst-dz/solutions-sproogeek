name: Deploy about.sproogeek.com

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          # NOTE: --delete removes anything on the server that is not in the repo.
          # backend/.env and backend/.venv are gitignored, so they MUST be excluded
          # here or every deploy would wipe the mail credentials and the virtualenv.
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.idea' \
            --exclude 'node_modules' \
            --exclude 'backend/.env' \
            --exclude 'backend/.venv' \
            --exclude 'backend/__pycache__' \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}"

      # Picks up backend changes. When the deploy user is not root this needs the
      # NOPASSWD sudoers rule from backend/README.md; `sudo -n` fails fast instead
      # of hanging on a password prompt that an SSH session cannot answer.
      - name: Restart lead relay
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash -se <<'REMOTE'
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}/backend"

            if [ -x ./.venv/bin/pip ]; then
              ./.venv/bin/pip install -q -r requirements.txt
            else
              echo "::warning::.venv missing — run the one-time setup from backend/README.md"
            fi

            if [ "$(id -u)" -eq 0 ]; then
              systemctl restart sproogeek-leads
            else
              sudo -n systemctl restart sproogeek-leads
            fi

            systemctl is-active --quiet sproogeek-leads && echo "relay is active"
          REMOTE
